<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
    <defs>
        <filter id="glowTitle" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#1E90FF" flood-opacity="0.6"/>
        </filter>
        <filter id="glowSub" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#1E90FF" flood-opacity="0.5"/>
        </filter>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;family=Noto+Sans+KR:wght@400;700&amp;display=swap');
            .title { font-family: 'Outfit', 'Noto Sans KR', sans-serif; font-weight: 800; font-size: 72px; fill: #ffffff; text-anchor: middle; filter: url(#glowTitle); letter-spacing: -1.5px; }
            .subtitle { font-family: 'Outfit', 'Noto Sans KR', sans-serif; font-weight: 400; font-size: 24px; fill: #ffffff; text-anchor: middle; filter: url(#glowSub); }
        </style>
    </defs>
    <text x="500" y="100" class="title">Building an Eco-friendly,</text>
    <text x="500" y="195" class="title">Carbon-neutral Ecosystem</text>
    <text x="500" y="270" class="subtitle">Specialized Vehicle ePTO Retrofit by ROC AUTO SYSTEM using Future Waste Resources (xEV)</text>
</svg>
